<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赞助支持 - 办公自动化工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.card { background: #fff; border-radius: 16px; padding: 40px 30px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.icon { font-size: 48px; margin-bottom: 12px; }
h1 { font-size: 24px; margin-bottom: 8px; }
p.desc { color: #888; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
.qr-box { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.qr-box img { width: 220px; height: 220px; border-radius: 8px; display: block; margin: 0 auto; }
.qr-label { font-size: 13px; color: #666; margin-top: 8px; }
.thanks { font-size: 12px; color: #aaa; margin-top: 4px; }
.features { text-align: left; margin: 20px 0; padding: 16px; background: #f8f9fa; border-radius: 12px; }
.features h3 { font-size: 14px; margin-bottom: 10px; color: #1a237e; }
.features li { font-size: 13px; color: #555; list-style: none; padding: 4px 0; }
.features li::before { content: "✓ "; color: #4CAF50; font-weight: bold; }
.footer { margin-top: 20px; font-size: 11px; color: #bbb; }
a { color: #1a237e; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔧</div>

  <div class="features">
    <h3>📦 包含6大工具</h3>
    <li>Excel批量合并 · Excel拆分</li>
    <li>批量重命名 · 图片批量处理</li>
    <li>PDF报表生成 · 文件分类整理</li>
  </div>

  <p class="desc" style="margin-bottom: 12px;">如果帮到了你，欢迎请作者喝杯咖啡 ☕</p>
  
  <div class="qr-box">
    <img src="donate_qr.jpg" alt="微信收款码">

    <div class="thanks">你的支持是作者持续更新的动力 ❤️</div>
  </div>
</div>
<div class="footer">
  办公自动化工具箱 · <a href="sales_page.html">了解更多</a>
